<app-navbar></app-navbar>

<!-- Hero Carousel -->
<div id="homeCarousel" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-indicators">
    <button *ngFor="let image of images; let i=index"
      type="button" data-bs-target="#homeCarousel"
      [attr.data-bs-slide-to]="i" [class.active]="i===0">
    </button>
  </div>
  <div class="carousel-inner">
    <div *ngFor="let image of images; let i=index"
      class="carousel-item" [class.active]="i===0">
      <img [src]="image.path" class="d-block w-100 slider-image" [alt]="image.title">
      <div class="carousel-caption">
        <h2>{{ image.title }}</h2>
        <p>{{ image.description }}</p>
      </div>
    </div>
  </div>
  <button class="carousel-control-prev" type="button"
    data-bs-target="#homeCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button"
    data-bs-target="#homeCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

<!-- Welcome -->
<section class="container my-5 text-center">
  <h2 class="section-title">Welcome to The Big Institution & Library</h2>
  <hr class="section-divider">
  <p class="text-muted mx-auto" style="max-width:600px; line-height:1.8;">
    We provide quality education, library resources, and a peaceful
    learning environment for students pursuing their academic goals.
  </p>
</section>

<!-- Feature Cards -->
<section class="container mb-5">
  <div class="row g-4">

      <div class="card p-4 text-center h-100">
        <div class="fs-1 mb-2">📚</div>
        <h4>Library</h4>
        <!-- <p class="text-muted">Wide collection of books and journals.</p> -->
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-4 text-center h-100">
        <div class="fs-1 mb-2">🏫</div>
        <h4>Classrooms</h4>
        <!-- <p class="text-muted">Modern, air-conditioned learning facilities.</p> -->
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-4 text-center h-100">
        <div class="fs-1 mb-2">🎓</div>
        <h4>Events</h4>
        <p class="text-muted">Workshops and educational programs.</p>
      </div>
    </div>
  </div>
</section>
